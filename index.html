<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRs1SEM0eh5-lDDi74Ffo1NUuOh0CW-9GqstTWTxl16Tf6Qge0Va1U0PaztrH6e7LgUVLUlHppYzFiI/pub?output=csv";

function normalize(text) {
  return text
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/ñ/g, "n")
    .replace(/[^\w\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function levenshtein(a, b) {
  const matrix = Array.from({ length: b.length + 1 }, (_, i) => [i]);
  for (let j = 1; j <= a.length; j++) {
    matrix[0][j] = j;
  }

  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      if (b.charAt(i - 1) === a.charAt(j - 1)) {
        matrix[i][j] = matrix[i - 1][j - 1];
      } else {
        matrix[i][j] = Math.min(
          matrix[i - 1][j - 1] + 1,
          matrix[i][j - 1] + 1,
          matrix[i - 1][j] + 1
        );
      }
    }
  }

  return matrix[b.length][a.length];
}

function tokenMatches(queryToken, nameToken) {
  if (queryToken === nameToken) return true;
  if (nameToken.startsWith(queryToken) && queryToken.length >= 3) return true;
  if (queryToken.length >= 4 && levenshtein(queryToken, nameToken) <= 1) return true;
  return false;
}

async function buscar() {
  const query = normalize(document.getElementById("search").value);
  const resultDiv = document.getElementById("result");

  if (!query) {
    resultDiv.innerHTML = "";
    return;
  }

  const queryTokens = query.split(" ").filter(Boolean);
  const res = await fetch(SHEET_URL);
  const data = await res.text();

  const rows = data.split("\n").slice(1);
  let matches = [];

  rows.forEach(row => {
    const columns = row.split(",");
    const first = columns[0]?.trim();
    const last = columns[1]?.trim();
    const table = columns[2]?.trim();

    if (!first || !last || !table) return;

    const fullName = normalize(first + " " + last);
    const nameTokens = fullName.split(" ").filter(Boolean);

    const isMatch = queryTokens.every(qToken =>
      nameTokens.some(nToken => tokenMatches(qToken, nToken))
    );

    if (isMatch) {
      matches.push(`${first} ${last}, te corresponde la Mesa ${table}`);
    }
  });

  if (matches.length === 0) {
    resultDiv.innerHTML = "No encontramos tu nombre. Por favor consulta con el personal.";
  } else {
    resultDiv.innerHTML = matches.join("<br><br>");
  }
}
</script>
