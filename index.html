<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Your Seat</title>

  <style>
    :root {
      --bg: #F5F4E4;
      --text: #3F4423;
      --border: #6B7050;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Figtree", Arial, sans-serif;
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 24px 64px;
    }

    .container {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }

    .date {
      font-family: "Fields Display", Georgia, serif;
      font-size: 18px;
      letter-spacing: 0.04em;
      margin: 48px 0 28px;
      color: var(--text);
    }

    h1 {
      font-family: "Fields Display", Georgia, serif;
      font-weight: 400;
      font-size: clamp(42px, 8vw, 68px);
      line-height: 1;
      letter-spacing: -0.02em;
      margin: 0 0 34px;
      color: var(--text);
    }

    .search-wrap {
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }

    input {
      width: 100%;
      max-width: 470px;
      height: 64px;
      border-radius: 999px;
      border: 2px solid var(--border);
      background: transparent;
      color: var(--text);
      text-align: center;
      font-family: "Figtree", Arial, sans-serif;
      font-size: 18px;
      outline: none;
      padding: 0 24px;
    }

    input::placeholder {
      color: rgba(63, 68, 35, 0.75);
    }

    button {
      width: 100%;
      max-width: 470px;
      height: 64px;
      border: none;
      border-radius: 999px;
      background: var(--text);
      color: var(--bg);
      font-family: "Figtree", Arial, sans-serif;
      font-size: 20px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.95;
    }

    .results {
      margin-top: 34px;
    }

    .table-block {
      margin-top: 26px;
    }

    .table-title {
      font-family: "Figtree", Arial, sans-serif;
      font-weight: 700;
      font-size: 28px;
      line-height: 1.1;
      margin: 0 0 10px;
      color: var(--text);
    }

    .guest-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .guest-list li {
      font-family: "Figtree", Arial, sans-serif;
      font-size: 20px;
      line-height: 1.35;
      color: var(--text);
      margin: 0;
    }

    .message {
      font-family: "Figtree", Arial, sans-serif;
      font-size: 18px;
      line-height: 1.4;
      color: var(--text);
      margin-top: 10px;
    }

    @media (max-width: 480px) {
      .page {
        padding: 32px 18px 48px;
      }

      .date {
        margin-top: 32px;
        font-size: 16px;
      }

      input,
      button {
        height: 60px;
      }

      .guest-list li {
        font-size: 18px;
      }

      .table-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="container">
      <div class="date">XVIII · IV · MMXXVI</div>
      <h1>Find Your Seat</h1>

      <div class="search-wrap">
        <input id="search" type="text" placeholder="Escribe tu nombre" />
        <button onclick="buscar()">Buscar</button>
      </div>

      <div class="results" id="result"></div>
    </div>
  </div>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRs1SEM0eh5-lDDi74Ffo1NUuOh0CW-9GqstTWTxl16Tf6Qge0Va1U0PaztrH6e7LgUVLUlHppYzFiI/pub?output=csv";

    function normalize(text) {
      return (text || "")
        .toString()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/ñ/g, "n")
        .replace(/[^\w\s]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function levenshtein(a, b) {
      const m = a.length;
      const n = b.length;
      const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));

      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;

      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + cost
          );
        }
      }

      return dp[m][n];
    }

    function tokenMatches(queryToken, nameToken) {
      if (queryToken === nameToken) return true;

      if (queryToken.length >= 4 && nameToken.startsWith(queryToken)) {
        return true;
      }

      if (queryToken.length >= 5 && levenshtein(queryToken, nameToken) <= 1) {
        return true;
      }

      return false;
    }

    function parseCsvLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];

        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result.map(cell => cell.trim());
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function buscar() {
      const query = normalize(document.getElementById("search").value);
      const resultDiv = document.getElementById("result");

      if (!query) {
        resultDiv.innerHTML = "";
        return;
      }

      resultDiv.innerHTML = '<div class="message">Buscando...</div>';

      try {
        const response = await fetch(SHEET_URL);
        if (!response.ok) {
          throw new Error("No se pudo cargar la lista.");
        }

        const data = await response.text();
        const rows = data.split(/\r?\n/).slice(1).filter(Boolean);
        const queryTokens = query.split(" ").filter(Boolean);

        const allGuests = [];
        const matchedGuests = [];

        rows.forEach((row) => {
          const columns = parseCsvLine(row);
          const first = columns[0] ? columns[0].trim() : "";
          const last = columns[1] ? columns[1].trim() : "";
          const table = columns[2] ? columns[2].trim() : "";

          if (!first || !last || !table) return;

          const fullName = `${first} ${last}`;
          const normalizedFullName = normalize(fullName);
          const nameTokens = normalizedFullName.split(" ").filter(Boolean);

          const guest = {
            first,
            last,
            fullName,
            normalizedFullName,
            table
          };

          allGuests.push(guest);

          const isMatch = queryTokens.every((qToken) =>
            nameTokens.some((nToken) => tokenMatches(qToken, nToken))
          );

          if (isMatch) {
            matchedGuests.push(guest);
          }
        });

        if (matchedGuests.length === 0) {
          resultDiv.innerHTML =
            '<div class="message">No encontramos tu nombre. Por favor consulta con el personal.</div>';
          return;
        }

        const matchedTables = [...new Set(matchedGuests.map(g => g.table))];

        const groupedTables = matchedTables.map((tableNumber) => {
          const guestsAtTable = allGuests
            .filter(g => g.table === tableNumber)
            .sort((a, b) => a.fullName.localeCompare(b.fullName, "es"));

          return {
            table: tableNumber,
            guests: guestsAtTable
          };
        });

        groupedTables.sort((a, b) => {
          const aNum = Number(a.table);
          const bNum = Number(b.table);

          if (!Number.isNaN(aNum) && !Number.isNaN(bNum)) {
            return aNum - bNum;
          }

          return a.table.localeCompare(b.table, "es");
        });

        resultDiv.innerHTML = groupedTables.map((group) => {
          const guestItems = group.guests
            .map(guest => `<li>${escapeHtml(guest.fullName)}</li>`)
            .join("");

          return `
            <div class="table-block">
              <div class="table-title">Mesa ${escapeHtml(group.table)}</div>
              <ul class="guest-list">
                ${guestItems}
              </ul>
            </div>
          `;
        }).join("");
      } catch (error) {
        console.error(error);
        resultDiv.innerHTML =
          '<div class="message">Ocurrió un error al cargar la lista. Intenta de nuevo.</div>';
      }
    }

    document.getElementById("search").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        buscar();
      }
    });
  </script>
</body>
</html>
